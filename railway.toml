[build]
buildCommand = "npm run build --workspace=server && cp -r server/src/db/migrations server/dist/db/migrations && cp -r server/src/db/seeds server/dist/db/seeds"

[deploy]
startCommand = "node server/dist/db/migrate.js && node server/dist/db/seed.js && npm run start --workspace=server"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
